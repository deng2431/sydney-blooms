<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Content — Sydney Blooms Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="adminSidebar"></div>
  <div class="main">
    <header class="main-header">
      <h1>Page Content</h1>
      <button class="btn btn-primary" form="contentForm" type="submit">Save All Changes</button>
    </header>
    <div class="main-body">
      <form id="contentForm">

        <div class="content-section">
          <div class="content-section__title">Home Page — Hero Section</div>
          <div class="form-group">
            <label class="form-label">Small Label (above headline)</label>
            <input class="form-input" type="text" data-key="hero_eyebrow" placeholder="Welcome to Sydney Blooms">
          </div>
          <div class="form-group">
            <label class="form-label">Main Headline</label>
            <input class="form-input" type="text" data-key="hero_title" placeholder="Fresh. Curated. Delivered.">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Subtitle</label>
            <input class="form-input" type="text" data-key="hero_subtitle" placeholder="Sydney's finest hand-tied bouquets, crafted with love">
          </div>
        </div>

        <div class="content-section">
          <div class="content-section__title">About Page — Our Story</div>
          <div class="form-group">
            <label class="form-label">Small Label (above title)</label>
            <input class="form-input" type="text" data-key="about_eyebrow" placeholder="How It Started">
          </div>
          <div class="form-group">
            <label class="form-label">Story Title</label>
            <input class="form-input" type="text" data-key="about_title" placeholder="From a kitchen table to Sydney's hearts">
          </div>
          <div class="form-group">
            <label class="form-label">Paragraph 1</label>
            <textarea class="form-textarea" data-key="about_para1" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Paragraph 2</label>
            <textarea class="form-textarea" data-key="about_para2" rows="3"></textarea>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Paragraph 3</label>
            <textarea class="form-textarea" data-key="about_para3" rows="3"></textarea>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;">
          <button type="submit" class="btn btn-primary">Save All Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="toast"></div>
<script src="js/admin-core.js"></script>
<script src="js/content-admin.js"></script>
</body>
</html>
