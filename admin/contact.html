<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Info — Sydney Blooms Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div id="adminSidebar"></div>
  <div class="main">
    <header class="main-header">
      <h1>Contact Info</h1>
      <button class="btn btn-primary" form="contactForm" type="submit">Save Changes</button>
    </header>
    <div class="main-body">
      <form id="contactForm">

        <div class="content-section">
          <div class="content-section__title">Address</div>
          <div class="form-group">
            <label class="form-label">Street Address</label>
            <input class="form-input" type="text" data-key="address_line1" placeholder="123 Flower Street">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Suburb / City / Postcode</label>
            <input class="form-input" type="text" data-key="address_line2" placeholder="Surry Hills, Sydney NSW 2010">
          </div>
        </div>

        <div class="content-section">
          <div class="content-section__title">Contact Details</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Phone Number</label>
              <input class="form-input" type="tel" data-key="phone" placeholder="(02) 9999 9999">
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input class="form-input" type="email" data-key="email" placeholder="hello@sydneyblooms.com.au">
            </div>
          </div>
        </div>

        <div class="content-section">
          <div class="content-section__title">Opening Hours</div>
          <div class="form-group">
            <label class="form-label">Monday – Friday</label>
            <input class="form-input" type="text" data-key="hours_weekday" placeholder="Mon – Fri: 8am – 6pm">
          </div>
          <div class="form-group">
            <label class="form-label">Saturday</label>
            <input class="form-input" type="text" data-key="hours_saturday" placeholder="Saturday: 8am – 4pm">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Sunday</label>
            <input class="form-input" type="text" data-key="hours_sunday" placeholder="Sunday: Closed">
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;">
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="toast"></div>
<script src="js/admin-core.js"></script>
<script src="js/contact-admin.js"></script>
</body>
</html>
